<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FeedsAI{% endblock %}</title>
  {% block head_extra %}{% endblock %}
  <style>
    /* Reset + base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
      padding: 0 1rem;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 1.5rem 0; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 0; border-bottom: 2px solid #e5e5e5; margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #111; }
    header nav a { color: #555; text-decoration: none; font-size: 0.9rem; margin-left: 1rem; }
    header nav a:hover { color: #111; }

    /* Digest item */
    .item {
      border-bottom: 1px solid #e8e8e8;
      padding: 1rem 0;
      cursor: pointer;
      transition: background 0.1s;
    }
    .item:hover { background: #f5f5f5; border-radius: 6px; padding-left: 0.5rem; }
    .item.read { opacity: 0.55; }
    .item-header { display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap; }
    .item-title { font-size: 1rem; font-weight: 600; color: #1a1a1a; flex: 1; min-width: 0; }
    .item-meta { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
    .item-excerpt { font-size: 0.9rem; color: #444; margin-top: 0.4rem; }
    .reason-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .reason-chip {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe;
      line-height: 1.35;
    }
    .reason-chip.novelty { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .reason-chip.caution { background: #f3f4f6; color: #4b5563; border-color: #d1d5db; }
    .item.low-signal { opacity: 0.72; }
    .cluster-link { font-size: 0.8rem; color: #0066cc; text-decoration: none; white-space: nowrap; }
    .saved-indicator { color: #b45309; font-size: 0.9rem; line-height: 1; }
    .digest-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap;
    }
    .toolbar-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .quality-toggle {
      color: #374151; text-decoration: none; font-size: 0.8rem;
      border: 1px solid #d1d5db; border-radius: 6px;
      padding: 4px 10px; background: #fff;
    }
    .quality-toggle:hover { background: #f3f4f6; }
    .quality-toggle:disabled { opacity: 0.55; cursor: default; }
    .quality-note {
      display: inline-block; margin-left: 0.5rem;
      color: #6b7280; font-weight: 600;
    }
    .queue-pill {
      display: inline-block; margin-left: 0.5rem; padding: 2px 8px;
      border-radius: 999px; background: #fffbeb; color: #92400e;
      border: 1px solid #fcd34d; font-size: 0.75rem; font-weight: 600;
    }

    /* Score badges */
    .score-badge {
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 8px; border-radius: 12px;
      white-space: nowrap; flex-shrink: 0;
    }
    .score-top    { background: #dcfce7; color: #166534; }
    .score-relevant { background: #fef9c3; color: #854d0e; }
    .score-borderline { background: #fee2e2; color: #991b1b; }

    /* HTMX drawer (desktop) */
    .drawer {
      display: none;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-left: 3px solid #2563eb;
      border-radius: 0 6px 6px 0;
      padding: 1rem 1.25rem;
      margin-top: 0.5rem;
    }
    .drawer.htmx-request { display: block; }  /* show while loading */
    .drawer-loaded { display: block !important; }
    .summary-content p { margin-bottom: 0.75rem; font-size: 0.9rem; line-height: 1.6; }
    .summary-content ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .summary-content li { font-size: 0.9rem; margin-bottom: 0.25rem; }
    .why-panel {
      border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.65rem 0.8rem;
      margin: 0.75rem 0; background: #f9fafb;
    }
    .why-panel summary { cursor: pointer; font-weight: 700; font-size: 0.86rem; }
    .why-grid { display: grid; gap: 0.4rem; margin-top: 0.6rem; }
    .why-grid div { display: grid; grid-template-columns: 110px 1fr; gap: 0.65rem; font-size: 0.82rem; }
    .why-grid span { color: #6b7280; }
    .reason-chip.match { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .read-original { font-size: 0.85rem; color: #2563eb; text-decoration: none; }
    .read-original:hover { text-decoration: underline; }
    .headline-link { margin-left: auto; flex-shrink: 0; }
    .loading-skeleton { color: #888; font-size: 0.85rem; font-style: italic; }

    /* Stale warning */
    .stale-banner {
      background: #fef9c3; border: 1px solid #fcd34d;
      border-radius: 6px; padding: 0.5rem 1rem;
      font-size: 0.85rem; color: #854d0e; margin-bottom: 1rem;
    }

    /* Empty states */
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: #888;
    }
    .empty-state code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; }
    .empty-actions {
      display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;
      margin-top: 1rem;
    }

    /* Status page */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 1rem; }
    .stat-card .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: #111; margin-top: 0.25rem; }

    /* Legacy compat */
    .meta { color: #888; font-size: 0.8rem; }
    .stale-warning { background: #fef9c3; border: 1px solid #fcd34d; border-radius: 6px; padding: 2px 8px; font-size: 0.85rem; color: #854d0e; display: inline-block; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; font-size: 0.875em; }

    /* Topic tabs */
    .topic-tabs {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .mode-tabs {
      display: inline-flex; gap: 0.2rem; padding: 3px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      background: #fff; margin-bottom: 1rem;
    }
    .mode-tab {
      font-size: 0.78rem; font-weight: 600;
      padding: 4px 10px; border-radius: 6px;
      color: #4b5563; text-decoration: none;
    }
    .mode-tab:hover { background: #f3f4f6; color: #111827; }
    .mode-active { background: #111827; color: #fff; }
    .mode-active:hover { background: #111827; color: #fff; }
    .tab {
      font-size: 0.78rem; font-weight: 500;
      padding: 4px 12px; border-radius: 20px;
      text-decoration: none; color: #555;
      background: #f0f0f0; border: 1px solid #e0e0e0;
      transition: background 0.1s, color 0.1s;
    }
    .tab:hover { background: #e0e0e0; color: #111; }
    .tab-active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .tab-active:hover { background: #1e40af; color: #fff; }

    /* Topic tag inside item meta */
    .topic-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      padding: 1px 7px; border-radius: 10px;
      background: #eff6ff; color: #1d4ed8;
      margin-right: 4px; text-transform: capitalize;
    }

    /* Drawer action row */
    .drawer-actions {
      display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap;
    }

    /* Like button */
    .like-btn, .save-btn {
      font-size: 0.8rem; font-weight: 500; padding: 4px 12px;
      border-radius: 6px; border: 1px solid #d1d5db;
      background: #fff; color: #374151; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .like-btn:hover { background: #fff0f0; border-color: #fca5a5; }
    .like-btn.liked { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .save-btn:hover { background: #fffbeb; border-color: #fcd34d; }
    .save-btn.saved { background: #fef3c7; color: #92400e; border-color: #f59e0b; }
    .like-btn:disabled, .save-btn:disabled { opacity: 0.6; cursor: default; }

    /* Show more button */
    .show-more-btn {
      display: block; margin: 1.5rem auto 0;
      font-size: 0.875rem; font-weight: 500; padding: 8px 24px;
      border-radius: 8px; border: 1px solid #d1d5db;
      background: #fff; color: #374151; cursor: pointer;
      transition: background 0.15s;
    }
    .show-more-btn:hover { background: #f3f4f6; }
    .htmx-request .show-more-btn { opacity: 0.7; pointer-events: none; }

    /* Status page extras */
    .live-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; margin-left: 0.5rem; vertical-align: middle;
      animation: live-pulse 1.6s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      50%      { opacity: 0.65; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
    .llm-table {
      width: 100%; border-collapse: collapse; margin-top: 0.75rem;
      background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
      font-size: 0.85rem; overflow: hidden;
    }
    .llm-table th, .llm-table td {
      text-align: left; padding: 6px 10px; border-bottom: 1px solid #f0f0f0;
    }
    .llm-table th { background: #f9fafb; font-weight: 600; color: #374151; }
    .llm-table tr:last-child td { border-bottom: none; }

    /* Fetch banner + manual trigger button */
    .fetch-banner {
      display: flex; align-items: center; gap: 0.6rem;
      background: #eff6ff; border: 1px solid #93c5fd;
      border-radius: 6px; padding: 0.5rem 1rem;
      font-size: 0.9rem; color: #1e3a8a; margin: 1rem 0;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #93c5fd; border-top-color: #1e3a8a;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fetch-btn {
      font-size: 0.8rem; font-weight: 500; padding: 4px 14px;
      border-radius: 6px; border: 1px solid #2563eb;
      background: #2563eb; color: #fff; cursor: pointer;
      transition: background 0.15s;
      margin-left: 0.5rem;
    }
    .fetch-btn:hover { background: #1d4ed8; }
    .fetch-btn:disabled { opacity: 0.6; cursor: default; }

    /* Logs page */
    .log-tail {
      background: #0b1020; color: #d6e0ff; font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
      font-size: 0.78rem; line-height: 1.45;
      padding: 0.75rem 1rem; border-radius: 8px;
      white-space: pre-wrap; word-break: break-word;
      max-height: 70vh; overflow: auto;
    }
    .log-line { display: block; }
    .log-line.warn { color: #facc15; }
    .log-line.err  { color: #fca5a5; }

    /* First-run setup */
    .setup-shell { max-width: 760px; margin: 0 auto; }
    .setup-header { margin-bottom: 1rem; }
    .setup-header h2 { font-size: 1.6rem; line-height: 1.2; margin-bottom: 0.3rem; }
    .setup-form { display: grid; gap: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .setup-form label { display: grid; gap: 0.35rem; font-size: 0.85rem; font-weight: 600; color: #374151; }
    .setup-form input[type="text"], .setup-form input:not([type]), .setup-form textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 0.65rem 0.75rem; font: inherit; background: #fff; color: #111827;
    }
    .setup-form textarea { resize: vertical; min-height: 6rem; }
    .source-panel {
      border: 1px solid #e5e7eb; background: #fff; border-radius: 8px;
      padding: 0.85rem 1rem; display: grid; gap: 0.5rem;
    }
    .source-panel h3 { font-size: 0.95rem; }
    .check-row { display: flex !important; align-items: center; gap: 0.55rem; font-weight: 500 !important; }
    .check-row input { width: 1rem; height: 1rem; }
    .setup-actions { display: flex; align-items: center; gap: 1rem; margin-top: 0.25rem; }
    .primary-btn {
      border: 1px solid #2563eb; background: #2563eb; color: #fff;
      border-radius: 6px; padding: 0.6rem 1rem; font-weight: 700; cursor: pointer;
    }
    .primary-btn:hover { background: #1d4ed8; }
    .secondary-link { color: #2563eb; text-decoration: none; font-size: 0.9rem; }
    .ask-form { display: grid; gap: 0.75rem; margin: 1rem 0; }
    .ask-form textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 0.75rem; font: inherit; resize: vertical; background: #fff;
    }
    .answer-panel {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 1rem; margin-top: 1rem;
    }
    .answer-panel h3 { margin-bottom: 0.4rem; }
    .source-list { padding-left: 1.3rem; }
    .source-list li { margin-bottom: 0.45rem; }
    .source-list .meta { display: block; }
    .header-search { display: flex; align-items: center; gap: 0.35rem; margin-left: 1rem; }
    .header-search input {
      width: 150px; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 3px 7px; font: inherit; font-size: 0.82rem;
    }
    .header-search button {
      border: 1px solid #d1d5db; background: #fff; border-radius: 6px;
      padding: 3px 8px; cursor: pointer; font-size: 0.82rem;
    }
    .search-page-form {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.5rem;
      align-items: center; margin: 1rem 0;
    }
    .search-page-form input[name="q"] {
      border: 1px solid #d1d5db; border-radius: 6px;
      padding: 0.6rem 0.7rem; font: inherit;
    }
    .search-results { display: grid; gap: 0.75rem; margin-top: 1rem; }
    .search-result {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 0.85rem 1rem;
    }
    .search-result h3 { font-size: 1rem; margin-bottom: 0.2rem; }
    .settings-panel {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 1rem; margin-top: 1rem;
    }
    .settings-panel h3 { margin-bottom: 0.6rem; }
    .inline-form { display: grid; grid-template-columns: 150px 1fr 1fr auto; gap: 0.5rem; align-items: center; }
    .inline-form input, .inline-form select {
      border: 1px solid #d1d5db; border-radius: 6px; padding: 0.55rem 0.65rem; font: inherit;
    }
    .source-settings-list { display: grid; gap: 0.5rem; }
    .source-settings-row {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.5rem; align-items: center;
      border-top: 1px solid #f3f4f6; padding-top: 0.5rem;
    }
    .quality-toggle.danger { color: #991b1b; border-color: #fecaca; }
    .source-health { margin-top: 0.2rem; }
    .health-good { color: #166534; font-weight: 700; }
    .health-bad { color: #991b1b; font-weight: 700; }
    .learning-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* Mobile: < 600px */
    @media (max-width: 600px) {
      body { padding: 0 0.75rem; }
      .item:hover { padding-left: 0; background: none; }
      .drawer { display: none !important; }  /* drawer hidden on mobile — use full page */
      .status-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.1rem; }
      .topic-tabs { gap: 0.3rem; }
      .tab { font-size: 0.72rem; padding: 3px 10px; }
      .form-grid { grid-template-columns: 1fr; }
      .inline-form, .source-settings-row { grid-template-columns: 1fr; }
      .learning-grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; gap: 0.75rem; }
      header nav { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: flex-end; }
      header nav a { margin-left: 0; }
      .header-search { width: 100%; margin-left: 0; }
      .header-search input { flex: 1; width: auto; }
      .search-page-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>FeedsAI</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/ask">Ask</a>
        <a href="/search">Search</a>
        <a href="/learning">Learning</a>
        <a href="/sources">Sources</a>
        <a href="/settings/sources">Settings</a>
        <a href="/setup">Setup</a>
        <a href="/status">Status</a>
        <a href="/logs">Logs</a>
        <form class="header-search" method="get" action="/search">
          <input name="q" placeholder="Search">
          <button type="submit">Go</button>
        </form>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
